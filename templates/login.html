{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}
{% block extra_head %}<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">{% endblock %}

{% block content %}
<div class="card login-card">
    <h2>Admin Login</h2>
    <p><strong>Username:</strong> {{ admin_username }}</p>
    <p class="muted">Password is not displayed for security.</p>
    <form action="{{ url_for('auth.login') }}" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="next" value="{{ next_url }}">
        <label for="username">Username</label>
        <input id="username" class="login-input" type="text" name="username" placeholder="Username" required>
        <label for="password">Password</label>
        <button id="toggle-password" class="toggle-password-btn" type="button">Show Password</button>
        <input id="password" class="login-input" type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/login.js') }}"></script>
{% endblock %}
